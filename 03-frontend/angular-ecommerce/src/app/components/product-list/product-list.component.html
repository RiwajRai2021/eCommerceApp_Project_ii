<div class="product-list">
  <div *ngFor="let product of products" class="product-card">
    <a [routerLink]="['/products', product.id]">
      <img [src]="product.imageUrl" [alt]="product.name" />
      <h3>{{ product.name }}</h3>
    </a>

    <p>{{ product.unitPrice | currency: 'USD' }}</p>
  </div>
</div>
