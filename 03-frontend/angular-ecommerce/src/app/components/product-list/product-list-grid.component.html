<div class="main-content">
  <div class="section-content section-content-p30">
    <div class="container-fluid">
      <!-- Show message when no products -->
      <div *ngIf="products.length === 0" class="alert alert-warning col-md-12" role="alert">
        No Products Found.
      </div>

      <!-- Show products when available -->
      <div class="row" *ngIf="products.length > 0">
        <div *ngFor="let temProduct of products" class="col-md-3">
          <div class="product-box">
            <img [src]="temProduct.imageUrl" class="img-responsive" />
            <h1>{{ temProduct.name }}</h1>
            <div class="price">{{ temProduct.unitPrice | currency: 'USD' }}</div>
            <a href="#" class="primary-btn">Add to cart</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
