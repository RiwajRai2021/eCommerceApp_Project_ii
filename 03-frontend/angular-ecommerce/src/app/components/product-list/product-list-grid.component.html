<div class="main-content">
  <div class="section-content section-content-p30">
    <div class="container-fluid">
      <!-- Show message when no products -->
      @if (products.length === 0) {
        <div class="alert alert-warning col-md-12" role="alert">No Products Found.</div>
      }

      <!-- Show products when available -->
      @if (products.length > 0) {
        <div class="row">
          @for (tempProduct of products; track tempProduct.id) {
            <div class="col-md-3">
              <div class="product-box">
                <a [routerLink]="['/products', tempProduct.id]">
                  <img [src]="tempProduct.imageUrl" class="img-responsive" />
                </a>
                <a [routerLink]="['/products', tempProduct.id]">
                  <h1>{{ tempProduct.name }}</h1>
                </a>
                <div class="price">{{ tempProduct.unitPrice | currency: 'USD' }}</div>
                <a href="#" class="primary-btn">Add to cart</a>
              </div>
            </div>
          }
        </div>
      }

      <!---begin footer-->
      <div class="footer-pagination">
        <div class="row">
          <div class="col-md-6"></div>

          <div class="col-md-6">
            <div class="row">
              <div class="col-md-9" style="padding-left: 30%">
                <!-- <p>
                  Total: {{ theTotalElements }} | Page: {{ thePageNumber }} | Size:
                  {{ thePageSize }}
                </p> -->
                <ngb-pagination
                  [collectionSize]="theTotalElements"
                  [(page)]="thePageNumber"
                  [pageSize]="thePageSize"
                  (pageChange)="updatePageNumber($event)"
                  [boundaryLinks]="true"
                >
                </ngb-pagination>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!----end footer -->
    </div>
  </div>
</div>
